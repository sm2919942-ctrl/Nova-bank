<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Bank | Register</title>

    <link rel="stylesheet" href="css/register.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>

    <div class="register-container">

        <div class="register-box">

            <h1>Open Your Nova Bank Account</h1>

            <form id="registerForm">

                <div class="row">

                    <div class="input-box">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter Full Name" required>
                    </div>

                    <div class="input-box">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Enter Email" required>
                    </div>

                </div>

                <div class="row">

                    <div class="input-box">
                        <label>Mobile Number</label>
                        <input type="tel" id="mobile" placeholder="Enter Mobile Number" required>
                    </div>

                    <div class="input-box">
                        <label>Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>

                </div>

                <div class="row">

                    <div class="input-box">
                        <label>Gender</label>

                        <select id="gender">
                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>

                    </div>

                    <div class="input-box">

                        <label>Account Type</label>

                        <select id="accountType">
                            <option>Savings</option>
                            <option>Current</option>
                        </select>

                    </div>

                </div>

                <div class="input-box">

                    <label>Address</label>

                    <textarea id="address" rows="4"
                        placeholder="Enter Address"></textarea>

                </div>

                <div class="row">

                    <div class="input-box">
                        <label>Aadhaar Number</label>
                        <input type="text" id="aadhaar" placeholder="12 Digit Aadhaar">
                    </div>

                    <div class="input-box">
                        <label>PAN Number</label>
                        <input type="text" id="pan" placeholder="ABCDE1234F">
                    </div>

                </div>

                <div class="row">

                    <div class="input-box">

                        <label>Password</label>

                        <input
                            type="password"
                            id="password"
                            placeholder="Password">

                    </div>

                    <div class="input-box">

                        <label>Confirm Password</label>

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm Password">

                    </div>

                </div>

                <button type="submit">

                    Create Account

                </button>

            </form>

            <p>

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </p>

        </div>

    </div>

    <script src="js/register.js"></script>

</body>

</html>
